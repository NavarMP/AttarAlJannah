name: CI / Deploy to Self‑Hosted Server

# run on pushes to main only
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # copy the built application and other files to the remote server
      - name: Deploy files to server
        uses: burnett01/rsync-deployments@v4
        with:
          switches: -avzr --delete
          path: ./
          remote_path: /home/minhajuljanna.in/shop/AttarAlJannah
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      # restart the process with PM2 (assumes an ecosystem file or script exists)
      - name: Restart PM2 on remote
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/minhajuljanna.in/shop/AttarAlJannah
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
